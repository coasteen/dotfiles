[window]
blur = false
opacity = 0.8
padding.x = 10
padding.y = 10
[window.dimensions]
columns = 140
lines = 30
[font]
normal = { family = "monospace", style = "regular" }
size = 6.5
[colors]

  # Gruvbox Dark
  primary.background = "#282828"  # Dark background
  primary.foreground = "#ebdbb2"  # Light foreground
  cursor.text        = "#282828"  # Cursor text (background)
  cursor.cursor      = "#ebdbb2"  # Cursor (foreground color)

  # Normal Colors
  normal.black   = "#282828"  # Dark background
  normal.red     = "#cc241d"  # Red
  normal.green   = "#98971a"  # Green
  normal.yellow  = "#d79921"  # Yellow
  normal.blue    = "#458588"  # Blue
  normal.magenta = "#b16286"  # Magenta
  normal.cyan    = "#689d6a"  # Cyan
  normal.white   = "#a89984"  # Light gray

  # Bright Colors
  bright.black   = "#928374"  # Gray
  bright.red     = "#fb4934"  # Bright red
  bright.green   = "#b8bb26"  # Bright green
  bright.yellow  = "#fabd2f"  # Bright yellow
  bright.blue    = "#83a598"  # Bright blue
  bright.magenta = "#d3869b"  # Bright magenta
  bright.cyan    = "#8ec07c"  # Bright cyan
  bright.white   = "#ebdbb2"  # Bright white

  # Dim Colors (Optional)
  dim.black   = "#3c3836"   # Dim black
  dim.red     = "#9d0006"   # Dim red
  dim.green   = "#79740e"   # Dim green
  dim.yellow  = "#b57614"   # Dim yellow
  dim.blue    = "#076678"   # Dim blue
  dim.magenta = "#8f3f71"   # Dim magenta
  dim.cyan    = "#427b58"   # Dim cyan
  dim.white   = "#a89984"   # Dim white

[cursor]
style.blinking = "On"
#color.cursor = "#F4DBD6"  # Rosewater
