print_info() {
term="Suckless Terminal"
shell="Z SHELL"
battery=$(sb-battery)
    info "SYSTEM" distro
    info "LAPTOP" model
    info "KERNEL" kernel
    info "UPTIME" uptime
    info "PROGS" packages
    info "SHELL" shell
    info "SCREEN" resolution
    info "MANAGER" wm
    prin "EMULATOR" "$term"
    info "PROCESSOR" cpu
    info "GRAPHICS" gpu
    info "SYS MEMORY" memory
    prin "BATTERY" $battery
    info "CPU USAGE" cpu_usage
    info "SONG" song
    info "ARTIST" artist
    info "ALBUM" album
    [[ "$player" ]] && prin "PLAYER" "$player"
}
title_fqdn="on"
kernel_shorthand="off"
distro_shorthand="on"
os_arch="off"
uptime_shorthand="on"
memory_percent="on"
memory_unit="mib"
package_managers="on"
shell_path="on"
shell_version="on"
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="on"
gpu_brand="on"
gpu_type="all"
refresh_rate="on"
gtk_shorthand="on"
gtk2="on"
gtk3="on"
public_ip_host="http://ident.me"
public_ip_timeout=2
de_version="on"
disk_show=('/')
disk_subtitle="mount"
disk_percent="on"
music_player="Spotify"
song_format="%title%"
song_shorthand="off"
mpc_args=()
colors=(distro)
bold="on"
underline_enabled="on"
underline_char="-"
separator=" >>"
block_range=(0 15)
color_blocks="on"
block_width=3
block_height=1
col_offset="7"
bar_char_elapsed="-"
bar_char_total="="
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"
cpu_display="off"
memory_display="off"
battery_display="off"
disk_display="off"
image_backend="ascii"
image_source="auto"
ascii_distro="netbsd"
ascii_colors=(distro)
ascii_bold="on"
image_loop="off"
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
